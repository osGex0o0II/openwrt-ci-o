# ============================================================
# BBR 拥塞控制 + fq qdisc 传输层调优
# 适用场景：ipq60xx NSS 千兆路由
# 参考：torvalds/linux/net/ipv4/tcp_bbr.c | man tc-fq(8)
#       kernel.org sysctl/net.html | OpenWrt #7733
#       RFC 7413 | Red Hat EL 9 网络性能调优
# ============================================================

# BBR（Bottleneck Bandwidth and Round-trip propagation time）：
# 基于带宽估计的拥塞控制算法，替代传统基于丢包的 CUBIC/Reno。
# BBR 要求底层 qdisc 提供 pacing（速率整形）功能。
# fq（Fair Queue）是当前唯一支持 per-flow pacing 的 classless qdisc。
# !!! fq_codel 不含 pacing，BBR + fq_codel 性能下降 6-10 倍 !!!
# 实测数据（OpenWrt #7733）：fq_codel=4-10MB/s, fq=40-60MB/s
net.ipv4.tcp_congestion_control=bbr
net.core.default_qdisc=fq

# TCP Fast Open（RFC 7413）：
#   0x1 = 客户端模式   0x2 = 服务端模式   0x4 = 客户端无 cookie
#   值 3 = 同时启用客户端和服务端
#   Linux 3.7+ 支持，安全性由 TFO cookie 机制保证
net.ipv4.tcp_fastopen=3

# TCP 缓冲区调优 — 基于带宽延迟积（BDP）计算
#   BDP = 带宽 x RTT = 1Gbps x 30ms = 3.75MB，取 4MB
#   三个值含义：min(硬下限) default(初始调优起点) max(上限)
#   tcp_rmem(接收): 4096 / 131072 / 4194304
#   tcp_wmem(发送): 4096 / 65536 / 4194304
net.core.rmem_max=4194304
net.core.wmem_max=4194304
net.ipv4.tcp_rmem=4096 131072 4194304
net.ipv4.tcp_wmem=4096 65536 4194304

# slow_start_after_idle=0 — 空闲后不重置 cwnd，减少突发延迟
# tcp_notsent_lowat=16384 — 限制未发送数据队列，防止 socket 膨胀
net.ipv4.tcp_slow_start_after_idle=0
net.ipv4.tcp_notsent_lowat=16384

# netdev_max_backlog — NIC 中断积压队列，千兆突发建议 5000（默认 1000）
net.core.netdev_max_backlog=5000
