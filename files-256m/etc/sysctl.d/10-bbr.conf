# ============================================================
# BBR 拥塞控制 + fq qdisc 传输层调优（256M 变体：512KB 缓冲区）
# 适用场景：ipq60xx NSS 千兆路由（256MB 内存）
# 参考：torvalds/linux/net/ipv4/tcp_bbr.c | man tc-fq(8)
#       kernel.org sysctl/net.html | OpenWrt #7733
#       RFC 7413 | Red Hat EL 9 网络性能调优
# ============================================================
#
# 与 files/etc/sysctl.d/10-bbr.conf 同名，通过 OpenWrt file overlay
# 机制直接替换，不依赖数字排序。256M 设备可用内存 ~157MB。
# 512KB 缓冲区上限是内存安全优先的权衡选择：
#   - BDP 理论需求：3.75MB（1Gbps × 30ms）
#   - 但 NSS 硬件卸除处理大部分数据面，主机 TCP 栈主要服务控制面
#   - 若调至 4MB/连接，10 并发 = 40MB，50 并发 = 200MB（OOM）
#   - 高延迟 WAN 场景下吞吐量可能受限，如需优先保证吞吐量，
#     可手动上调至 2MB-4MB（注意监控内存使用）

# BBR（Bottleneck Bandwidth and Round-trip propagation time）：
# 基于带宽估计的拥塞控制算法，替代传统基于丢包的 CUBIC/Reno。
# BBR 要求底层 qdisc 提供 pacing（速率整形）功能。
# fq（Fair Queue）是当前唯一支持 per-flow pacing 的 classless qdisc。
# !!! fq_codel 不含 pacing，BBR + fq_codel 性能下降 6-10 倍 !!!
# 实测数据（OpenWrt #7733）：fq_codel=4-10MB/s, fq=40-60MB/s
net.ipv4.tcp_congestion_control=bbr

# TCP Fast Open（RFC 7413）：
#   0x1 = 客户端模式   0x2 = 服务端模式   0x4 = 客户端无 cookie
#   值 3 = 同时启用客户端和服务端
#   Linux 3.7+ 支持，安全性由 TFO cookie 机制保证
net.ipv4.tcp_fastopen=3

# TCP 缓冲区调优 — 基于带宽延迟积（BDP）计算
# 256M 变体：512KB 限制，防止高并发 OOM
net.core.rmem_max=524288
net.core.wmem_max=524288
net.ipv4.tcp_rmem=4096 87380 524288
net.ipv4.tcp_wmem=4096 65536 524288

# slow_start_after_idle=0 — 空闲后不重置 cwnd，减少突发延迟
# tcp_notsent_lowat=16384 — 限制未发送数据队列，防止 socket 膨胀
net.ipv4.tcp_slow_start_after_idle=0
net.ipv4.tcp_notsent_lowat=16384

# netdev_max_backlog — NIC 中断积压队列，千兆突发建议 5000（默认 1000）
net.core.netdev_max_backlog=5000

# fq qdisc — BBR 依赖 per-flow pacing，fq 是唯一支持 classless qdisc。
# !!! fq_codel 不含 pacing，BBR + fq_codel 性能下降 6-10 倍 !!!
# 实测（OpenWrt #7733）：fq_codel=4-10MB/s, fq=40-60MB/s。
net.core.default_qdisc=fq