# ============================================================
# nf_conntrack 连接追踪表最大值调优 — 256MB 版本
# 适用场景：ZN-M2 256MB（实际可用 ~157MB）
# 参考：kernel.org nf_conntrack-sysctl.html
#       catalyst/conntrack-table-memory | OpenWrt PR #10431
# ============================================================
#
# 内存消耗（kernel 6.x, 64-bit）：
#   每 conntrack 条目 = 328 bytes
#   当前值 16384 x 328 = ~5.1MB（vs 默认 65535 x 328 = ~20.5MB）
#   节省约 15MB 峰值内存，适用于 256MB 设备的正常家庭/办公负载
#
# 注：nf_conntrack_buckets 由内核根据 max 自动计算，无需手动指定
net.netfilter.nf_conntrack_max=16384
