name: ZN-M2 256M Main Router

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: configs/zn-m2-256m-mainrouter.config
  DIY_SCRIPT: libwrt.sh
  INCLUDE_HOMEPROXY: "0"
  VARIANT_FILES: files-256m
  CACHE_TOOLCHAIN: true
  UPLOAD_BIN_DIR: false
  FIRMWARE_RELEASE: true
  FIRMWARE_TAG: ZN-M2-256M-6.12-NSS-MainRouter
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build ZN-M2 256M Main Router firmware
    runs-on: ubuntu-latest

    steps:
      - name: Check server
        run: |
          echo "CPU: $(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2-)"
          echo "Cores: $(nproc)"
          free -h
          df -hT

      - name: Initialize environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo bash -c 'bash <(curl -fsSL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq clean
          sudo timedatectl set-timezone "$TZ"

      - name: Maximize build space
        uses: easimon/maximize-build-space@v1
        with:
          swap-size-mb: 1024
          temp-reserve-mb: 100
          root-reserve-mb: 1024

      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone source
        run: |
          git clone --depth=1 -b "$REPO_BRANCH" "$REPO_URL" openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> "$GITHUB_ENV"
          {
            echo "VERSION_INFO<<EOF"
            git show -s --date=short --format='Author: %an<br/>Date: %cd<br/>Subject: %s<br/>Hash: %H'
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Load config and detect target
        run: |
          cp "$CONFIG_FILE" openwrt/.config
          cd openwrt
          make defconfig
          grep -q '^CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_zn_m2=y$' .config
          grep -q '^CONFIG_TARGET_PROFILE="DEVICE_zn_m2"$' .config
          grep -q '^CONFIG_TARGET_ROOTFS_SQUASHFS=y$' .config
          source_repo="${REPO_URL##*/}"
          echo "SOURCE_REPO=${source_repo%.git}" >> "$GITHUB_ENV"
          echo "DEVICE_TARGET=$(awk -F'"' '/CONFIG_TARGET_BOARD/{print $2}' .config)" >> "$GITHUB_ENV"
          echo "DEVICE_SUBTARGET=$(awk -F'"' '/CONFIG_TARGET_SUBTARGET/{print $2}' .config)" >> "$GITHUB_ENV"
          kernel_version="$(awk -F'[=-]' '/LINUX_VERSION-6\.12/{print $2; exit}' target/linux/generic/kernel-6.12 2>/dev/null || true)"
          echo "VERSION_KERNEL=${kernel_version:-6.12}" >> "$GITHUB_ENV"

      - name: Cache toolchain
        if: env.CACHE_TOOLCHAIN == 'true'
        uses: HiGarfield/cachewrtbuild@v1
        with:
          ccache: false
          mixkey: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-zn-m2-256m-mainrouter
          prefix: ${{ env.OPENWRT_PATH }}

      - name: Install feeds
        run: |
          cd "$OPENWRT_PATH"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply custom files and packages
        run: |
          [ -d files ] && mkdir -p "$OPENWRT_PATH/files" && cp -a files/. "$OPENWRT_PATH/files/"
          [ -n "$VARIANT_FILES" ] && [ -d "$VARIANT_FILES" ] && cp -a "$VARIANT_FILES"/. "$OPENWRT_PATH/files/"
          cp "$CONFIG_FILE" "$OPENWRT_PATH/.config"
          dos2unix "$DIY_SCRIPT"
          chmod +x "$DIY_SCRIPT"
          cd "$OPENWRT_PATH"
          "$GITHUB_WORKSPACE/$DIY_SCRIPT"

      - name: Download packages
        run: |
          cd "$OPENWRT_PATH"
          make defconfig
          grep -q '^CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_zn_m2=y$' .config
          grep -q '^CONFIG_TARGET_PROFILE="DEVICE_zn_m2"$' .config
          ! grep -q '^CONFIG_PACKAGE_luci-app-homeproxy=y$' .config
          ! grep -q '^CONFIG_PACKAGE_sing-box=y$' .config
          make download -j"$(nproc)"
          find dl -size -1024c -print -delete

      - name: Compile firmware
        id: compile
        run: |
          cd "$OPENWRT_PATH"
          make -j"$(nproc)" || make -j1 V=s
          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "DATE=$(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_ENV"
          echo "FILE_DATE=$(date '+%Y.%m.%d')" >> "$GITHUB_ENV"

      - name: Organize firmware
        if: steps.compile.outputs.status == 'success'
        run: |
          cd "$OPENWRT_PATH/bin/targets"/*/*
          ls -lh
          test -f ./*zn_m2*squashfs-factory.ubi
          test -f ./*zn_m2*squashfs-sysupgrade.bin
          ! find . -maxdepth 1 -name '*mango*' -print -quit | grep -q .
          cat sha256sums
          cp "$OPENWRT_PATH/.config" build.config
          mkdir -p packages
          if [ -d "$OPENWRT_PATH/bin/packages" ]; then
            find "$OPENWRT_PATH/bin/packages" -type f \( -name '*.apk' -o -name '*.ipk' \) -exec mv -t packages {} +
          fi
          tar -zcf Packages.tar.gz packages
          rm -rf packages feeds.buildinfo version.buildinfo
          echo "FIRMWARE_PATH=$PWD" >> "$GITHUB_ENV"

      - name: Upload firmware artifact
        if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE != 'true'
        uses: actions/upload-artifact@v4
        with:
          path: ${{ env.FIRMWARE_PATH }}

      - name: Publish release
        if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
        uses: ncipollo/release-action@v1
        with:
          name: R${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}
          allowUpdates: true
          replacesArtifacts: true
          tag: ${{ env.FIRMWARE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ env.FIRMWARE_PATH }}/*
          body: |
            **ZN-M2 256M LiBwrt 6.12 NSS Main Router firmware**

            - Source: ${{ env.REPO_URL }}
            - Branch: ${{ env.REPO_BRANCH }}
            - Kernel: ${{ env.VERSION_KERNEL }}
            - Default address: 192.168.1.1
            - Default user/password: root/password
            - Source revision: ${{ env.VERSION_INFO }}
