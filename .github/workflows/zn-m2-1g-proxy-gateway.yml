name: ZN-M2 1G Proxy Gateway

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: configs/zn-m2-1g-proxygateway.config
  DIY_SCRIPT: libwrt.sh
  INCLUDE_HOMEPROXY: "1"
  VARIANT_FILES: ""
  # 锁定上游源码 commit（留空则使用分支最新 HEAD）。
  REPO_COMMIT: ""
  CACHE_TOOLCHAIN: true
  UPLOAD_BIN_DIR: false
  FIRMWARE_RELEASE: true
  FIRMWARE_TAG: ZN-M2-1G-6.12-NSS-ProxyGateway
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ZN-M2 1G Proxy Gateway firmware
    runs-on: ubuntu-latest

    steps:
      - name: Check server
        run: |
          echo "CPU: $(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2-)"
          echo "Cores: $(nproc)"
          free -h
          df -hT

      - name: Initialize environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo bash -c 'bash <(curl -fsSL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq clean
          sudo timedatectl set-timezone "$TZ"

      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          swap-size-mb: 1024
          root-reserve-mb: 1024

      - name: Checkout
        uses: actions/checkout@v6

      - name: Clone source
        id: clone_source
        run: |
          git clone --depth=1 -b "$REPO_BRANCH" "$REPO_URL" openwrt
          if [ -n "$REPO_COMMIT" ]; then
            cd openwrt
            # --depth=1 不包含历史 commit，需先 fetch 指定 hash 再 checkout
            git fetch --depth=1 origin "$REPO_COMMIT"
            git -c advice.detachedHead=false checkout FETCH_HEAD
            cd "$OLDPWD"
          fi
          cd openwrt
          echo "OPENWRT_PATH=$PWD" | tee -a "$GITHUB_ENV" "$GITHUB_OUTPUT"
          echo "SOURCE_REPO_COMMIT_SHORT=$(git rev-parse --short HEAD)" | tee -a "$GITHUB_ENV" "$GITHUB_OUTPUT"
          {
            echo "VERSION_INFO<<EOF"
            git show -s --date=short --format='Author: %an%nDate: %cd%nSubject: %s%nHash: %H'
            echo "EOF"
          } | tee -a "$GITHUB_ENV" "$GITHUB_OUTPUT"

      - name: Load config and detect target
        id: detect_target
        run: |
          cp "$CONFIG_FILE" openwrt/.config
          cd openwrt
          make defconfig
          grep -q '^CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_zn_m2=y$' .config
          grep -q '^CONFIG_TARGET_PROFILE="DEVICE_zn_m2"$' .config
          grep -q '^CONFIG_TARGET_ROOTFS_SQUASHFS=y$' .config
          source_repo="${REPO_URL##*/}"
          {
            echo "SOURCE_REPO=${source_repo%.git}"
            echo "DEVICE_TARGET=$(awk -F'"' '/CONFIG_TARGET_BOARD/{print $2}' .config)"
            echo "DEVICE_SUBTARGET=$(awk -F'"' '/CONFIG_TARGET_SUBTARGET/{print $2}' .config)"
            kernel_version="$(grep -E '^KERNEL_PATCHVER:=' target/linux/qualcommax/Makefile 2>/dev/null | sed 's/.*:=//;s/^[[:space:]]*//')"
            echo "VERSION_KERNEL=${kernel_version:-6.12}"
          } | tee -a "$GITHUB_ENV" "$GITHUB_OUTPUT"

      - name: Cache toolchain
        if: env.CACHE_TOOLCHAIN == 'true'
        uses: HiGarfield/cachewrtbuild@3c396d6d42253c392a1c7c2ca996869c3d5b5853
        with:
          ccache: false
          mixkey: ${{ steps.detect_target.outputs.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ steps.detect_target.outputs.DEVICE_TARGET }}-${{ steps.detect_target.outputs.DEVICE_SUBTARGET }}-zn-m2-1g-proxygateway-${{ steps.clone_source.outputs.SOURCE_REPO_COMMIT_SHORT }}
          prefix: ${{ steps.clone_source.outputs.OPENWRT_PATH }}

      - name: Install feeds
        run: |
          cd "$OPENWRT_PATH"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply custom files and packages
        run: |
          mkdir -p "$OPENWRT_PATH/files"
          [ -d files ] && cp -a files/. "$OPENWRT_PATH/files/"
          [ -n "$VARIANT_FILES" ] && [ -d "$VARIANT_FILES" ] && cp -a "$VARIANT_FILES"/. "$OPENWRT_PATH/files/"
          cp "$CONFIG_FILE" "$OPENWRT_PATH/.config"
          dos2unix "$DIY_SCRIPT"
          chmod +x "$DIY_SCRIPT"
          cd "$OPENWRT_PATH"
          "$GITHUB_WORKSPACE/$DIY_SCRIPT"

      - name: Download packages
        run: |
          cd "$OPENWRT_PATH"
          make defconfig
          grep -q '^CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_zn_m2=y$' .config
          grep -q '^CONFIG_TARGET_PROFILE="DEVICE_zn_m2"$' .config
          grep -q '^CONFIG_PACKAGE_luci-app-homeproxy=y$' .config
          grep -q '^CONFIG_PACKAGE_sing-box=y$' .config
          make download -j"$(nproc)"
          find dl -size -1024c -print -delete

      - name: Compile firmware
        id: compile
        run: |
          cd "$OPENWRT_PATH"
          if make -j"$(nproc)"; then
            echo "Parallel build succeeded"
          elif make -j1 V=s; then
            echo "Single-threaded retry succeeded"
          else
            echo "Both parallel and single-threaded builds failed"
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "DATE=$(date '+%Y-%m-%d %H:%M:%S')" | tee -a "$GITHUB_ENV" "$GITHUB_OUTPUT"
          echo "FILE_DATE=$(date '+%Y.%m.%d')" | tee -a "$GITHUB_ENV" "$GITHUB_OUTPUT"

      - name: Organize firmware
        id: organize
        if: steps.compile.outputs.status == 'success'
        run: |
          cd "$OPENWRT_PATH/bin/targets"/*/*
          ls -lh
          test -f ./*zn_m2*squashfs-factory.ubi
          test -f ./*zn_m2*squashfs-sysupgrade.bin
          ! find . -maxdepth 1 -name '*mango*' -print -quit | grep -q .
          cat sha256sums
          # 重命名固件：去掉高通平台标识，统一命名风格，包含变体名（4 位年份避免 Y2.1K 问题）。
          mv ./*zn_m2*squashfs-factory.ubi "LiBwrt-${FILE_DATE}-ZN_M2-NOWIFI-1G-factory.ubi"
          mv ./*zn_m2*squashfs-sysupgrade.bin "LiBwrt-${FILE_DATE}-ZN_M2-NOWIFI-1G-sysupgrade.bin"
          sha256sum LiBwrt-${FILE_DATE}-ZN_M2-NOWIFI-* > sha256sums
          cp "$OPENWRT_PATH/.config" build.config
          mkdir -p packages
          if [ -d "$OPENWRT_PATH/bin/packages" ]; then
            find "$OPENWRT_PATH/bin/packages" -type f \( -name '*.apk' -o -name '*.ipk' \) -exec mv -t packages {} +
          fi
          tar -zcf Packages.tar.gz packages
          rm -rf packages feeds.buildinfo version.buildinfo
          echo "FIRMWARE_PATH=$PWD" | tee -a "$GITHUB_ENV" "$GITHUB_OUTPUT"

      - name: Upload firmware artifact
        if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE != 'true'
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.organize.outputs.FIRMWARE_PATH }}

      - name: Publish release
        if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
        uses: ncipollo/release-action@v1.21.0
        with:
          name: R${{ steps.compile.outputs.FILE_DATE }} — ${{ env.FIRMWARE_TAG }}
          allowUpdates: true
          replacesArtifacts: true
          tag: ${{ env.FIRMWARE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ steps.organize.outputs.FIRMWARE_PATH }}/*
          body: |
            **ZN-M2 1G LiBwrt 6.12 NSS Proxy Gateway firmware**

            - Source: ${{ env.REPO_URL }}
            - Branch: ${{ env.REPO_BRANCH }}
            - Kernel: ${{ steps.detect_target.outputs.VERSION_KERNEL }}
            - Default address: 192.168.1.1
            - Default user/password: root/password
            - Source revision: ${{ steps.clone_source.outputs.VERSION_INFO }}
